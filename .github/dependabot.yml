version: 2
updates:
  # Root workspace dependencies
  # This repo uses a single root package-lock.json, so npm updates need to be
  # generated from "/" to keep package manifests and the lockfile in sync.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 8
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-*"
      vite-react:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
      testing:
        patterns:
          - "*vitest*"
          - "*playwright*"
          - "*testing-library*"
          - "happy-dom"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "react-router-dom"
          - "react-virtuoso"
      rendering:
        patterns:
          - "three"
          - "@types/three"
      vercel:
        patterns:
          - "@vercel/*"
    labels:
      - "dependencies"
      - "workspace"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
